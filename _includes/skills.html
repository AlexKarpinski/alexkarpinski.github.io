{% assign sidebar = site.data.data.sidebar %}
{% if sidebar.skills %}
<div class="skills-container container-block">
  <h2 class="container-block-title">{{ sidebar.skills.title }}</h2>
  <ul class="list-unstyled interests-list">
    {% for skill in sidebar.skills.info %}
    <li>{{ skill.item }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}
