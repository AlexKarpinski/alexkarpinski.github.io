career-profile:
  title: Career Profile
  summary: |
    Senior Test Automation Engineer with 6+ years in building test automation solutions with Cypress/Playwright.
    Build scalable automation frameworks and CI quality gates that improve release confidence and speed.

    Highlights:
    - ~90% coverage of critical user flows (UI + API), including smoke and regression
    - 10-minute smoke quality gate in CI for fast PR validation
    - Flaky rate reduced ~15% → ~5%; overall stability +~30% via isolated/atomic test targets

    Core skills:
    - Automation: Playwright, Cypress, Axios (TS/JS)
    - Testing: functional, regression, smoke, exploratory; cross-browser/cross-platform
    - CI/CD: GitHub Actions, Jenkins; test run analysis, reporting, quality gates
    - QA process: requirements analysis, test strategy/planning, defect lifecycle (TestRail/Jira)
    - AI tools: GitHub Copilot, ChatGPT, Codex

