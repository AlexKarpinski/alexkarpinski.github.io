experiences:
  title: Experience
  info:
    - role: Senior Test Automation Engineer
      time: Mar 2023 - Present
      company: Brightsec, Gdańsk, Poland (Remote)
      details: |
        Product: Dynamic Application Security Testing (DAST).

        - Owned and evolved three automation frameworks across workflow, UI, and API layers: TypeScript/Axios/Cucumber for core functionality, Playwright-based UI/API E2E, and Cypress/TypeScript/Cucumber application/API regression suite (TestRail-backed)
        - Built and maintained GitHub Actions automation (manual triggers, nightly runs, scheduled pipelines, dev-branch smoke), providing a stable CI signal with Slack reporting and release-readiness visibility
        - Designed a 10-minute smoke quality gate covering 15 scan configurations, enabling fast PR validation of core scanning behaviour
        - Scaled workflow-level regression runs to 20 parallel workers, keeping ~400 heavy E2E scenarios within ~1.5 hours daily runtime (target startup → scanning → assertions)
        - Reduced flaky failures from ~15% to ~5% and improved overall stability by ~30% by increasing test determinism, isolating dependencies, and hardening assertions for scan-oriented flows
        - Provisioned isolated mock targets via Docker + Helm with unique per-run URLs and automated artifact/data cleanup, reducing environment noise and improving reproducibility
        - Implemented observability and benchmarking: metrics collection and Grafana dashboards, plus benchmark reporting in Google Sheets; reduced failure investigation time by ~80% through better visibility and reporting hygiene
        - Maintained a Cypress-based application/API regression suite in TypeScript/Cucumber covering ~1,200 tests, including ~800 API scenarios across scopes, API keys, UI, smoke, and daily regression flows, with TestRail-backed test management and parallel CI execution
        - Led the transition of UI/API E2E coverage to Playwright, removing the Cucumber layer and introducing fixtures, multi-tab/multi-session scenarios, and typed API seeding for maintainable, stable tests

    - role: QA Automation Engineer
      time: Mar 2020 - Mar 2023
      company: iTechArt, Minsk
      details: |
        Delivered automation across multiple client projects (web and mobile), with full Scrum participation and direct customer communication.
        Progression: from building Cypress frameworks from scratch, to scaling cross-platform mobile automation, to owning automation strategy for critical payment flows.

        Project: E-commerce platform (NDA): Mar 2022 - Mar 2023
      
        Stack: Playwright, Cypress, JavaScript, Bitbucket, TestRail
        - Owned automation strategy for critical user journeys, including payment flows, keeping coverage aligned with business risk
        - Achieved ~85% coverage of critical paths
        - Designed a maintainable test architecture (fixtures, page objects/helpers, selector and test data strategy), reducing maintenance effort by ~70%
        - Expanded Cypress UI automation to 100+ regression scenarios and 30 high-signal smoke checks
        - Performed PR reviews with a focus on testability, stability, and maintainability
        - Investigated failures, reduced flaky behavior, and provided actionable defect reports for faster turnaround
        - Communicated progress, risks, and quality status directly to the customer while participating in all Scrum ceremonies

        Project: GA: Mar 2021 - Feb 2022
      
        Stack: WebdriverIO, Appium, JavaScript, Allure, BrowserStack, Git, CircleCI, Jenkins
        - Built and maintained a cross-platform automation framework (web + iOS/Android) using WebdriverIO and Appium, covering ~80% of critical scenarios
        - Scaled cloud execution in BrowserStack across 20+ device/browser configurations with Allure reporting
        - Improved run visibility and reduced investigation time by ~80%
        - Integrated automated suites into Jenkins and CircleCI, delivering CI feedback in ~40 minutes and supporting release readiness gates
        - Implemented reliable cross-platform scenarios, managed test data, and maintained consistent execution environments
        - Triaged test results, performed root-cause analysis, and collaborated with developers on fixes and quality improvements

        Project: DC: Mar 2020 - Feb 2021
      
        Stack: Cypress, JavaScript, TestRail, Jira, Git, Jenkins
        - Built a Cypress automation framework from scratch and standardized test conventions across the team
        - Reduced onboarding time for new automated tests by ~70% through reusable patterns and framework structure
        - Automated 200+ business-critical CRM workflows, including 30 smoke scenarios
        - Integrated suites into Jenkins for on-demand and scheduled runs
        - Delivered ~20-minute smoke feedback and ~4-hour full regression runtime
        - Reduced flaky failures from ~15% to ~5% through refactoring and maintainability improvements
        - Provided sprint-level quality insights in TestRail and Jira by tracking coverage and release readiness, helping keep sprint commitments above 90%

