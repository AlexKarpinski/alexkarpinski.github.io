experiences:
  title: Experience
  info:
    - role: Senior Test Automation Engineer
      time: Mar 2023 - Present
      company: Brightsec, Gdańsk, Poland (Remote)
      details: |
        Product: Dynamic Application Security Testing (DAST).

        - Developed and evolved a web + API automation frameworks (Playwright/Cypress/Axios + TypeScript), covering ~90% of critical user flows (smoke + regression)
        - Introduced a 10-minute smoke suite as a CI quality gate enabling fast PR validation and safer releases
        - Reduced flaky rate from ~15% to ~5% by improving test determinism and stabilizing critical checks
        - Increased overall stability by ~30% by isolating environment dependencies via atomic test targets (minimizing env-related failures)
        - Set up and maintained automated execution in GitHub CI (PR + scheduled), monitored runs, and kept feedback signal reliable for release decisions
        - Built reusable utilities and refactored framework components to improve maintainability and speed up test development
        - Coordinated and trained developers on automation best practices and testability-focused PR improvements; partnered on triage/RCA for faster defect resolution
        - Reported and tracked defects with actionable evidence; communicated quality status and release readiness via concise reporting and documentation

    - role: QA Automation Engineer
      time: Aug 2020 - Mar 2023
      company: Itechart, Minsk
      details: |
        Worked on multiple client projects (web and mobile), with full Scrum participation and direct customer communication.
        Focus areas: test automation strategy, framework development, CI integration, and end-to-end coverage for critical flows.

        Project: E-commerce platform (NDA): Mar 2022 - Mar 2023
        
        Stack: Playwright, Cypress, JavaScript, Bitbucket, TestRail
        - Owned automation strategy for key user journeys incl. payment flows, keeping coverage aligned to business risk
        - Achieved ~85% coverage of critical paths.
        - Designed maintainable architecture (fixtures, page objects/helpers, selector + test data strategy), reducing maintenance effort by ~70%.
        - Delivered UI automation in Cypress, expanding regression to 100+ scenarios and smoke to 30 high-signal checks.
        - Performed PR reviews with focus on testability, stability and maintainability
        - Investigated failures, reduced flaky behavior, and provided actionable defect reports for fast turnaround
        - Communicated progress and risks directly with the customer and participated in all Scrum ceremonies

        Project: GA: Mar 2021 - Dec 2022
        
        Stack: WebdriverIO, Appium, JavaScript, Allure, BrowserStack, Git, CircleCI, Jenkins
        - Built and maintained a cross-platform automation framework (Web + iOS/Android) on WebdriverIO + Appium, covering 80% critical scenarios
        - Scaled cloud execution in BrowserStack across 20+ device/browser configs with Allure reporting
        - Improving run visibility and reducing investigation time by 80%.
        - Integrated automated suites into Jenkins, delivering CI feedback in ~40 min and supporting release readiness gates.
        - Implemented cross-platform test scenarios, managed test data, and ensured consistent environments
        - Triaged test results, analyzed root causes, and collaborated with developers on fixes and improvements

        Project: DC: Mar 2020 - Feb 2021
        
        Stack: Cypress, JavaScript, Cypress, TestRail, Jira, Git, Jenkins
        - Built a Cypress automation framework from scratch
        - Enabling onboarding of new tests in 70% less time and standardizing test conventions across the team
        - Automated 200+ business-critical CRM workflows (incl. 30 smoke)
        - Integrated suites into Jenkins with + scheduled runs
        - Delivered ~20 min smoke feedback and ~4 hours full regression runtime
        - Reduced maintenance cost by refactoring, cutting flaky failures from 15% → 5%
        - Provided sprint quality insights (TestRail/Jira): tracked coverage and release readiness, helping keep sprint commitments at 90%+
        - Supported sprint delivery with quality insights

