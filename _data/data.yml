experiences:
  title: Experience
  info:
    - role: Senior QA Automation Engineer (SDET)
      time: Mar 2023 - Present
      company: Brightsec, Gdańsk, Poland (Remote)
      details: |
        Product: Dynamic Application Security Testing (DAST).

        - Developed and evolved an automation framework for web and API testing (Playwright/Cypress/Axios + TypeScript)
        - Planned and estimated automation activities
        - Created and maintained test suites and reusable utilities
        - Coordinated developer teams and trained them in test automation approaches and best practices
        - Analyzed requirements and validated specifications to prevent gaps and regressions early
        - Refactored framework components to improve maintainability and speed up test development
        - Set up automated test execution in CI (GitHub), monitored runs and stabilized flaky tests
        - Prepared reports, communicated quality status, and documented outcomes
        - Reported and tracked defects

    - role: QA Automation Engineer
      time: Aug 2020 - Mar 2023
      company: Itechart, Minsk
      details: |
        Worked on multiple client projects (web and mobile), with full Scrum participation and direct customer communication.
        Focus areas: test automation strategy, framework development, CI integration, and end-to-end coverage for critical flows.

        Project: E-commerce platform (NDA): Mar 2022 - Mar 2023
        
        Stack: Playwright, Cypress, JavaScript, Bitbucket, TestRail
        - Owned test automation approach for key user journeys and payment-related flows; aligned coverage with business priorities
        - Designed maintainable test architecture: reusable fixtures, page objects/helpers, stable selectors and data strategies
        - Implemented UI automation with Playwright and Cypress 
        - Expanded regression pack and smoke suite
        - Performed PR reviews with focus on testability, stability and maintainability
        - Investigated failures, reduced flaky behavior, and provided actionable defect reports for fast turnaround
        - Communicated progress and risks directly with the customer and participated in all Scrum ceremonies

        Project: GA: Mar 2021 - Dec 2022
        
        Stack: WebdriverIO, Appium, JavaScript, Allure, BrowserStack, Git, CircleCI, Jenkins
        - Built and maintained automation framework for web and mobile (iOS/Android) using WebdriverIO + Appium
        - Set up and supported cloud device runs (BrowserStack) and reporting (Allure)
        - Integrated automated runs into CI pipelines (Jenkins/CircleCI), improved feedback loop for releases
        - Implemented cross-platform test scenarios, managed test data, and ensured consistent environments
        - Triaged test results, analyzed root causes, and collaborated with developers on fixes and improvements

        Project: DC: Mar 2020 - Feb 2021
        
        Stack: Cypress, JavaScript, Cypress, TestRail, Jira, Git, Jenkins
        - Developed Cypress-based automation framework from scratch and established conventions for writing tests
        - Automated critical CRM workflows; ensured cross-browser compatibility and stable selectors
        - Organized CI execution in Jenkins and used Cypress Dashboard for visibility and debugging
        - Maintained test suites, refactored common components, and kept documentation up to date
        - Reported defects with clear reproduction steps and evidence
        - Supported sprint delivery with quality insights

